<header class="main-header">
  <div class="container">
    <div class="logo" routerLink="">
      <span class="logo-icon">🍰</span>
      <span class="logo-text">Dar <span>al-Halva</span></span>
    </div>

    <nav class="nav-menu" [class.open]="isMenuOpen">
      <ul>
        <li>
          <a [routerLink]="isProductsPage ? '/' : '/products'">
            {{ isProductsPage ? 'Главная' : 'Каталог' }}
          </a>
        </li>
        <li><a routerLinkActive="active"routerLink="/contacts">Контакты</a></li>
        <li><a routerLink="/delivery" routerLinkActive="active">Доставка</a></li>
        <li><a routerLink="/reviews" routerLinkActive="active">Отзывы</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <button class="icon-btn" title="Поиск">
        <i class="search-icon"><img src="/icons/search.svg" alt="" /></i>
      </button>
      <button class="cart-btn" routerLink="cart">
        <span class="cart-icon"><img src="/icons/cart.svg" alt="" /></span>
        <span class="cart-count">{{ selectedCount() }}</span>
      </button>
      <button class="burger-btn" (click)="toggleMenu()">☰</button>
    </div>
  </div>
</header>
<div class="menu-overlay" *ngIf="isMenuOpen" (click)="closeMenu()"></div>
