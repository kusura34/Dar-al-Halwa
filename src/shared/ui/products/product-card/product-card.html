<div class="card">
  
  <div class="image-container">
    <img [src]="product.imageUrl" [alt]="product.name">
  </div>

  <div class="content">
    <h3 class="title">{{ product.name }}</h3>
    <p class="description">{{ product.description | limitLength }}</p>
    
    <div class="footer">
      <span class="price">{{ product.price }} ₽</span>
      <span class="weight">{{ product.weight }} гр</span>
      <button class="buy-btn" (click)="addToCart(product)">
        <img style="width: 40%;" src="icons/cart-white.svg"/>
      </button>
    </div>
  </div>
</div>
