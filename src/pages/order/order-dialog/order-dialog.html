<div class="order-dialog">
  <h2>Оформление заказа</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Ваше имя</label>
      <input type="text" formControlName="name" placeholder="Ваше имя" />
      <small *ngIf="form.controls.name.touched && form.controls.name.invalid"> Введите имя </small>
    </div>

    <div class="field">
      <label>Телефон</label>
      <input
        type="tel"
        formControlName="phone"
        [showMaskTyped]="true"
        mask="+0(000)000-00-00"
        placeholder="Номер телефона"
      />
      <small *ngIf="form.controls.phone.touched && form.controls.phone.invalid">
        Введите корректный номер телефона, в противном случае мы не сможем с вами связаться
      </small>
    </div>

    <div class="field">
      <label>Город</label>
      <input type="text" formControlName="city" placeholder="Казань" value="Казань" />
      <small *ngIf="form.controls.city.errors?.['notKazan']">
        Доставка доступна только по Казани
      </small>
    </div>

    <div class="field">
      <label>Дата доставки</label>
      <input type="date" formControlName="date" />
      <small *ngIf="form.controls.date.errors?.['pastDate']">
        Выберите дату не раньше завтра
      </small>
    </div>

    <button type="submit" class="submit-btn" [disabled]="form.invalid" (click)="sendOrder()">
      Подтвердить заказ
    </button>
    <button (click)="close()" class="submit-btn">Отмена</button>
  </form>
</div>
